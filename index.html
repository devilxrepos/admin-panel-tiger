<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiger Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Login Page -->
    <div id="loginPage" style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
        <div class="card shadow-lg" style="width: 400px; border-radius: 15px;">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-shield-lock-fill text-primary" style="font-size: 3rem;"></i>
                    <h3 class="mt-2">Admin Login</h3>
                    <p class="text-muted">Tiger License Manager</p>
                </div>
                
                <div id="loginError" class="alert alert-danger" style="display: none;"></div>
                
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" placeholder="admin@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2" id="loginButton">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Login
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboardPage" style="display: none; min-height: 100vh; background: #f5f7fa;">
        
        <!-- Navbar -->
        <nav class="navbar navbar-dark bg-dark px-3">
            <span class="navbar-brand"><i class="bi bi-shield-lock-fill me-2"></i>Tiger Admin</span>
            <div class="d-flex align-items-center">
                <span class="text-white me-3" id="userEmail"></span>
                <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
            </div>
        </nav>

        <div class="container-fluid mt-3">
            <div class="row">
                
                <!-- Sidebar -->
                <div class="col-md-2">
                    <div class="list-group">
                        <a href="#" class="list-group-item list-group-item-action active" data-page="keys">
                            <i class="bi bi-key-fill me-2"></i>License Keys
                        </a>
                        <a href="#" class="list-group-item list-group-item-action" data-page="generate">
                            <i class="bi bi-plus-circle-fill me-2"></i>Generate Keys
                        </a>
                        <a href="#" class="list-group-item list-group-item-action" data-page="stats">
                            <i class="bi bi-graph-up me-2"></i>Statistics
                        </a>
                    </div>
                </div>

                <!-- Main Content -->
                <div class="col-md-10">
                    
                    <!-- Keys Page -->
                    <div id="pageKeys">
                        <h3 class="mb-3">License Keys</h3>
                        <div class="card">
                            <div class="card-body">
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <input type="text" class="form-control" id="searchKey" placeholder="Search keys...">
                                    </div>
                                    <div class="col-md-3">
                                        <select class="form-select" id="filterType">
                                            <option value="all">All Types</option>
                                            <option value="trial">Trial</option>
                                            <option value="premium">Premium</option>
                                            <option value="lifetime">Lifetime</option>
                                        </select>
                                    </div>
                                    <div class="col-md-3">
                                        <button class="btn btn-primary w-100" onclick="loadKeys()">Search</button>
                                    </div>
                                </div>
                                <div class="table-responsive">
                                    <table class="table table-hover">
                                        <thead>
                                            <tr>
                                                <th>License Key</th>
                                                <th>Type</th>
                                                <th>Status</th>
                                                <th>Created</th>
                                                <th>Expires</th>
                                                <th>Device</th>
                                                <th>Action</th>
                                            </tr>
                                        </thead>
                                        <tbody id="keysTableBody">
                                            <tr><td colspan="7" class="text-center py-4 text-muted">Loading...</td></tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Generate Page -->
                    <div id="pageGenerate" style="display: none;">
                        <h3 class="mb-3">Generate License Keys</h3>
                        <div class="card">
                            <div class="card-body">
                                <form id="generateForm">
                                    <div class="row g-3">
                                        <div class="col-md-4">
                                            <label class="form-label">Key Type</label>
                                            <select class="form-select" id="keyType">
                                                <option value="trial">Trial (7 days)</option>
                                                <option value="premium">Premium (30 days)</option>
                                                <option value="lifetime">Lifetime</option>
                                            </select>
                                        </div>
                                        <div class="col-md-3">
                                            <label class="form-label">Quantity</label>
                                            <input type="number" class="form-control" id="keyCount" value="1" min="1" max="100">
                                        </div>
                                        <div class="col-md-3">
                                            <label class="form-label">Prefix (optional)</label>
                                            <input type="text" class="form-control" id="keyPrefix" placeholder="TIGER">
                                        </div>
                                        <div class="col-md-2">
                                            <label class="form-label">&nbsp;</label>
                                            <button type="submit" class="btn btn-success w-100">Generate</button>
                                        </div>
                                    </div>
                                </form>
                                <div id="generatedKeysBox" style="display: none;" class="mt-4">
                                    <h5>Generated Keys:</h5>
                                    <div id="generatedKeysList" class="bg-light p-3 rounded"></div>
                                    <button class="btn btn-sm btn-outline-primary mt-2 me-2" onclick="copyAllKeys()">Copy All</button>
                                    <button class="btn btn-sm btn-outline-success mt-2" onclick="exportKeys()">Export CSV</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Stats Page -->
                    <div id="pageStats" style="display: none;">
                        <h3 class="mb-3">Statistics</h3>
                        <div class="row">
                            <div class="col-md-3">
                                <div class="card bg-primary text-white">
                                    <div class="card-body text-center">
                                        <h5>Total Keys</h5>
                                        <h2 id="totalKeys">0</h2>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="card bg-success text-white">
                                    <div class="card-body text-center">
                                        <h5>Active Keys</h5>
                                        <h2 id="activeKeys">0</h2>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="card bg-warning text-white">
                                    <div class="card-body text-center">
                                        <h5>Trial Keys</h5>
                                        <h2 id="trialKeys">0</h2>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="card bg-info text-white">
                                    <div class="card-body text-center">
                                        <h5>Premium Keys</h5>
                                        <h2 id="premiumKeys">0</h2>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>
    
    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS -->
    <script src="js/firebase-config.js"></script>
    <script src="js/admin.js"></script>
</body>
  </html>
