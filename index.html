<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiger Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f5f5f5;
            font-family: Arial, sans-serif;
        }
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .login-container h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            font-size: 16px;
        }
        #errorMsg {
            display: none;
        }
        .dashboard {
            display: none;
            padding: 20px;
        }
        .navbar {
            margin-bottom: 20px;
        }
        .stats-card {
            padding: 20px;
            border-radius: 10px;
            color: white;
            text-align: center;
            margin-bottom: 15px;
        }
        .bg-blue { background: #2196F3; }
        .bg-green { background: #4CAF50; }
        .bg-orange { background: #FF9800; }
        .bg-purple { background: #9C27B0; }
        .key-item {
            background: #f8f9fa;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            font-family: monospace;
            border: 1px solid #dee2e6;
        }
        code {
            background: #e9ecef;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 13px;
        }
        .table td {
            vertical-align: middle;
        }
    </style>
</head>
<body>

    <!-- LOGIN PAGE -->
    <div id="loginPage">
        <div class="login-container">
            <h2>&#128274; Admin Login</h2>
            <div id="errorMsg" class="alert alert-danger"></div>
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" id="emailInput" placeholder="admin@example.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" id="passwordInput" placeholder="Password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-login" id="loginBtn">Login</button>
            </form>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboardPage" class="dashboard">
        <nav class="navbar navbar-dark bg-dark rounded">
            <div class="container-fluid">
                <span class="navbar-brand">&#128047; Tiger Admin Panel</span>
                <span class="text-white me-3" id="userDisplay"></span>
                <button class="btn btn-outline-light btn-sm" onclick="doLogout()">Logout</button>
            </div>
        </nav>

        <div class="row">
            <div class="col-md-3">
                <div class="list-group mb-3">
                    <a href="#" class="list-group-item list-group-item-action active" onclick="showTab('keys')">&#128273; License Keys</a>
                    <a href="#" class="list-group-item list-group-item-action" onclick="showTab('generate')">&#10133; Generate Keys</a>
                    <a href="#" class="list-group-item list-group-item-action" onclick="showTab('stats')">&#128202; Statistics</a>
                </div>

                <!-- Stats Cards -->
                <div class="stats-card bg-blue">
                    <h4 id="statTotal">0</h4>
                    <small>Total Keys</small>
                </div>
                <div class="stats-card bg-green">
                    <h4 id="statActive">0</h4>
                    <small>Active Keys</small>
                </div>
                <div class="stats-card bg-orange">
                    <h4 id="statTrial">0</h4>
                    <small>Trial Keys</small>
                </div>
                <div class="stats-card bg-purple">
                    <h4 id="statPremium">0</h4>
                    <small>Premium Keys</small>
                </div>
            </div>

            <div class="col-md-9">
                <!-- Keys Tab -->
                <div id="tabKeys">
                    <div class="card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">All License Keys (users node)</h5>
                            <button class="btn btn-outline-primary btn-sm" onclick="refreshKeys()">&#128260; Refresh</button>
                        </div>
                        <div class="card-body">
                            <div class="mb-3">
                                <input type="text" class="form-control" id="searchBox" placeholder="Search keys..." onkeyup="refreshKeys()">
                            </div>
                            <div id="keysContainer">
                                <p class="text-center text-muted">Loading keys...</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Generate Tab -->
                <div id="tabGenerate" style="display:none;">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="mb-0">Generate New License Keys</h5>
                        </div>
                        <div class="card-body">
                            <form id="generateForm">
                                <div class="row mb-3">
                                    <div class="col-md-4">
                                        <label class="form-label">Key Type</label>
                                        <select class="form-select" id="keyTypeSelect">
                                            <option value="trial">Trial (7 days)</option>
                                            <option value="premium">Premium (30 days)</option>
                                            <option value="lifetime">Lifetime</option>
                                        </select>
                                    </div>
                                    <div class="col-md-3">
                                        <label class="form-label">Quantity</label>
                                        <input type="number" class="form-control" id="keyCountInput" value="1" min="1" max="100">
                                    </div>
                                    <div class="col-md-3">
                                        <label class="form-label">Prefix</label>
                                        <input type="text" class="form-control" id="prefixInput" value="TIGER">
                                    </div>
                                    <div class="col-md-2">
                                        <label class="form-label">&nbsp;</label>
                                        <button type="submit" class="btn btn-success w-100">Generate</button>
                                    </div>
                                </div>
                            </form>
                            <div id="generatedKeysContainer" style="display:none;">
                                <hr>
                                <h6>Generated Keys (Saved to users node):</h6>
                                <div id="generatedKeysList"></div>
                                <button class="btn btn-sm btn-outline-primary mt-2" onclick="copyGeneratedKeys()">&#128203; Copy All</button>
                                <button class="btn btn-sm btn-outline-success mt-2 ms-1" onclick="exportCSV()">&#128229; Export CSV</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Stats Tab -->
                <div id="tabStats" style="display:none;">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="mb-0">License Statistics</h5>
                        </div>
                        <div class="card-body">
                            <div id="statsDetail">
                                <p class="text-center text-muted">Loading statistics...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // ==========================================
        // FIREBASE CONFIG
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyD4LsjVeocuVcZ3qZUi6j7tzz-1DKNtmtM",
            authDomain: "mujahid-tiger.firebaseapp.com",
            databaseURL: "https://mujahid-tiger-default-rtdb.firebaseio.com",
            projectId: "mujahid-tiger",
            storageBucket: "mujahid-tiger.firebasestorage.app",
            messagingSenderId: "609986313885",
            appId: "1:609986313885:web:d7a22ddaec17a040211e74"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();

        console.log('Firebase initialized');

        // ==========================================
        // AUTH STATE
        // ==========================================
        auth.onAuthStateChanged(function(user) {
            if (user) {
                console.log('Logged in as:', user.email);
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('dashboardPage').style.display = 'block';
                document.getElementById('userDisplay').textContent = user.email;
                refreshKeys();
                loadStats();
            } else {
                console.log('Not logged in');
                document.getElementById('loginPage').style.display = 'block';
                document.getElementById('dashboardPage').style.display = 'none';
            }
        });

        // ==========================================
        // LOGIN
        // ==========================================
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value;
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('errorMsg');
            
            errorDiv.style.display = 'none';
            btn.disabled = true;
            btn.textContent = 'Logging in...';
            
            auth.signInWithEmailAndPassword(email, password)
                .then(function(result) {
                    console.log('Login success:', result.user.email);
                    document.getElementById('loginForm').reset();
                })
                .catch(function(error) {
                    console.error('Login error:', error.message);
                    errorDiv.style.display = 'block';
                    errorDiv.textContent = 'Error: ' + error.message;
                    btn.disabled = false;
                    btn.textContent = 'Login';
                });
        });

        // ==========================================
        // LOGOUT
        // ==========================================
        function doLogout() {
            auth.signOut().then(function() {
                console.log('Logged out');
            });
        }

        // ==========================================
        // TAB NAVIGATION
        // ==========================================
        function showTab(tab) {
            document.getElementById('tabKeys').style.display = 'none';
            document.getElementById('tabGenerate').style.display = 'none';
            document.getElementById('tabStats').style.display = 'none';
            
            if (tab === 'keys') {
                document.getElementById('tabKeys').style.display = 'block';
                refreshKeys();
            } else if (tab === 'generate') {
                document.getElementById('tabGenerate').style.display = 'block';
            } else if (tab === 'stats') {
                document.getElementById('tabStats').style.display = 'block';
                loadStats();
            }
            
            document.querySelectorAll('.list-group-item').forEach(function(el, i) {
                el.classList.remove('active');
                if ((tab === 'keys' && i === 0) || (tab === 'generate' && i === 1) || (tab === 'stats' && i === 2)) {
                    el.classList.add('active');
                }
            });
        }

        // ==========================================
        // GENERATE KEYS - FIXED FOR ANDROID APP
        // ==========================================
        document.getElementById('generateForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const user = auth.currentUser;
            if (!user) {
                alert('Please login first!');
                return;
            }
            
            const keyType = document.getElementById('keyTypeSelect').value;
            const keyCount = parseInt(document.getElementById('keyCountInput').value) || 1;
            const prefix = document.getElementById('prefixInput').value || 'TIGER';
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            const now = new Date().toISOString();
            
            let expDays = 7;
            if (keyType === 'premium') expDays = 30;
            if (keyType === 'lifetime') expDays = 36500;
            
            const expires = keyType === 'lifetime' ? 'never' : new Date(Date.now() + (expDays * 24 * 60 * 60 * 1000)).toISOString();
            
            const generatedKeys = [];
            const promises = [];
            
            for (let i = 0; i < keyCount; i++) {
                // Generate random key
                let key = prefix;
                for (let s = 0; s < 4; s++) {
                    key += '-';
                    for (let c = 0; c < 4; c++) {
                        key += chars.charAt(Math.floor(Math.random() * chars.length));
                    }
                }
                generatedKeys.push(key);
                
                // Clean key for Firebase path
                const safeKey = key.replace(/[.#$/[\]]/g, '_');
                
                // SAVE WITH EXACT FIELDS YOUR ANDROID APP EXPECTS
                // Based on smali code: GotKey, GotUid, GotExp, GotKenb, IsRes, DEVICE, GotUid2
                const promise = database.ref('users/' + safeKey).set({
                    key: key,
                    uid: key,
                    exp: expires,
                    kenb: key,
                    isRes: 'false',
                    device: '',
                    uid2: '',
                    type: keyType,
                    status: 'active',
                    created: now,
                    expires: expires,
                    packageName: 'com.Tiger349x.hack.demo',
                    createdAt: firebase.database.ServerValue.TIMESTAMP
                });
                
                promises.push(promise);
            }
            
            Promise.all(promises)
                .then(function() {
                    // Display generated keys
                    let html = '';
                    generatedKeys.forEach(function(k, idx) {
                        html += '<div class="key-item">';
                        html += '<strong>' + (idx + 1) + '.</strong> ';
                        html += '<code>' + k + '</code> ';
                        html += '<button class="btn btn-sm btn-outline-secondary float-end" onclick="copyKey(\'' + k.replace(/'/g, "\\'") + '\')">Copy</button>';
                        html += '</div>';
                    });
                    document.getElementById('generatedKeysList').innerHTML = html;
                    document.getElementById('generatedKeysContainer').style.display = 'block';
                    loadStats();
                    alert('Success! Generated ' + generatedKeys.length + ' keys.\n\nSaved to: users node\nReady for Android app!');
                })
                .catch(function(error) {
                    console.error('Save error:', error);
                    alert('Error saving keys: ' + error.message + '\n\nCheck Firebase Database Rules!');
                });
        });

        // ==========================================
        // LOAD KEYS - FIXED
        // ==========================================
        function refreshKeys() {
            const container = document.getElementById('keysContainer');
            const searchTerm = document.getElementById('searchBox')?.value?.toLowerCase() || '';
            
            container.innerHTML = '<p class="text-center text-muted">Loading keys from users node...</p>';
            
            database.ref('users').once('value')
                .then(function(snapshot) {
                    const keys = [];
                    
                    snapshot.forEach(function(child) {
                        const data = child.val();
                        
                        // Accept data with either key or kenb field
                        if (data.key || data.kenb) {
                            data.id = child.key;
                            
                            // Normalize fields
                            if (!data.key) data.key = data.kenb || '';
                            if (!data.type) data.type = 'unknown';
                            if (!data.status) data.status = 'active';
                            if (!data.expires) data.expires = data.exp || '';
                            if (!data.device) data.device = '';
                            if (!data.created) data.created = '';
                            
                            // Apply search filter
                            if (searchTerm && !data.key.toLowerCase().includes(searchTerm)) return;
                            
                            keys.push(data);
                        }
                    });
                    
                    if (keys.length === 0) {
                        container.innerHTML = '<p class="text-center text-muted">No keys found in users node. Generate some keys!</p>';
                        return;
                    }
                    
                    let html = '<div class="table-responsive"><table class="table table-striped table-hover">';
                    html += '<thead><tr><th>License Key</th><th>Type</th><th>Status</th><th>Expires</th><th>Device</th><th>Action</th></tr></thead><tbody>';
                    
                    keys.forEach(function(k) {
                        const exp = !k.expires || k.expires === 'never' ? 'Never' : new Date(k.expires).toLocaleDateString();
                        const device = k.device || 'Not assigned';
                        const statusBadge = k.status === 'active' ? 'bg-success' : k.status === 'inactive' ? 'bg-warning' : 'bg-danger';
                        const typeBadge = k.type === 'trial' ? 'bg-info' : k.type === 'premium' ? 'bg-primary' : 'bg-success';
                        
                        html += '<tr>';
                        html += '<td><code>' + k.key + '</code></td>';
                        html += '<td><span class="badge ' + typeBadge + '">' + k.type + '</span></td>';
                        html += '<td><span class="badge ' + statusBadge + '">' + k.status + '</span></td>';
                        html += '<td>' + exp + '</td>';
                        html += '<td><small>' + device + '</small></td>';
                        html += '<td><button class="btn btn-sm btn-danger" onclick="deleteKey(\'' + k.id + '\')">Delete</button></td>';
                        html += '</tr>';
                    });
                    
                    html += '</tbody></table></div>';
                    html += '<small class="text-muted">Total: ' + keys.length + ' keys</small>';
                    
                    container.innerHTML = html;
                })
                .catch(function(error) {
                    console.error('Load error:', error);
                    container.innerHTML = '<div class="alert alert-danger">Error loading keys: ' + error.message + '<br><small>Check Firebase Database Rules (set to allow read/write)</small></div>';
                });
        }

        // ==========================================
        // DELETE KEY
        // ==========================================
        function deleteKey(id) {
            if (confirm('Are you sure you want to delete this key? This cannot be undone.')) {
                database.ref('users/' + id).remove()
                    .then(function() {
                        console.log('Deleted:', id);
                        refreshKeys();
                        loadStats();
                    })
                    .catch(function(error) {
                        alert('Error deleting: ' + error.message);
                    });
            }
        }

        // ==========================================
        // LOAD STATS
        // ==========================================
        function loadStats() {
            database.ref('users').once('value')
                .then(function(snapshot) {
                    let total = 0, active = 0, inactive = 0, trial = 0, premium = 0, lifetime = 0;
                    
                    snapshot.forEach(function(child) {
                        const data = child.val();
                        if (data.key || data.kenb) {
                            total++;
                            if (data.status === 'active') active++;
                            else inactive++;
                            if (data.type === 'trial') trial++;
                            else if (data.type === 'premium') premium++;
                            else if (data.type === 'lifetime') lifetime++;
                        }
                    });
                    
                    document.getElementById('statTotal').textContent = total;
                    document.getElementById('statActive').textContent = active;
                    document.getElementById('statTrial').textContent = trial;
                    document.getElementById('statPremium').textContent = premium + lifetime;
                    
                    document.getElementById('statsDetail').innerHTML = 
                        '<div class="row">' +
                        '<div class="col-6"><p>Total Keys: <strong>' + total + '</strong></p></div>' +
                        '<div class="col-6"><p>Active: <strong>' + active + '</strong></p></div>' +
                        '<div class="col-6"><p>Inactive/Expired: <strong>' + inactive + '</strong></p></div>' +
                        '<div class="col-6"><p>Trial: <strong>' + trial + '</strong></p></div>' +
                        '<div class="col-6"><p>Premium: <strong>' + premium + '</strong></p></div>' +
                        '<div class="col-6"><p>Lifetime: <strong>' + lifetime + '</strong></p></div>' +
                        '</div>';
                })
                .catch(function(error) {
                    console.error('Stats error:', error);
                });
        }

        // ==========================================
        // UTILITY FUNCTIONS
        // ==========================================
        function copyKey(text) {
            navigator.clipboard.writeText(text).then(function() {
                alert('Copied: ' + text);
            }).catch(function() {
                prompt('Copy this key:', text);
            });
        }

        function copyGeneratedKeys() {
            const keyElements = document.querySelectorAll('#generatedKeysList code');
            if (keyElements.length === 0) {
                alert('No keys to copy!');
                return;
            }
            
            let text = '';
            keyElements.forEach(function(el, i) {
                text += (i + 1) + '. ' + el.textContent + '\n';
            });
            
            navigator.clipboard.writeText(text).then(function() {
                alert('Copied ' + keyElements.length + ' keys to clipboard!');
            }).catch(function() {
                prompt('Copy keys:', text);
            });
        }

        function exportCSV() {
            const keyElements = document.querySelectorAll('#generatedKeysList code');
            if (keyElements.length === 0) {
                alert('No keys to export!');
                return;
            }
            
            let csv = 'License Key\n';
            keyElements.forEach(function(el) {
                csv += '"' + el.textContent + '"\n';
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'tiger-keys-' + new Date().toISOString().slice(0, 10) + '.csv';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        console.log('Admin panel ready - Saving to users node');
        console.log('Fields: key, uid, exp, kenb, isRes, device, uid2');
    </script>
</body>
</html>
